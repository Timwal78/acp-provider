services:
  # ── Worker: ACP event listener (job intake) ─────────────────────────────
  - type: worker
    name: acp-provider-scriptmasterlabs
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: ACP_CONFIG_JSON
        sync: false
      - key: ACP_SIGNER_KEYS_JSON
        sync: false
      - key: ACP_KEYRING_KEY_B64
        sync: false
      - key: ACP_AGENT_WALLET_ADDRESS
        value: "0x72330994f379a71542e7bd5a4cf99a9d9743f4aa"
      - key: ACP_REFRESH_TOKEN
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FRED_API_KEY
        sync: false
      - key: CONGRESS_API_KEY
        sync: false

  # ── Web service: x402/A2A/MCP HTTP layer ────────────────────────────────
  # Same Docker image, but overrides CMD to run gunicorn instead of provider.py.
  # This binds to $PORT so Render detects it as a live web service.
  - type: web
    name: acp-x402-scriptmasterlabs
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    dockerCommand: python3 -m gunicorn x402_server:app --bind 0.0.0.0:$$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: X402_PAY_TO
        value: "0x72330994f379a71542e7bd5a4cf99a9d9743f4aa"
      - key: X402_NETWORK
        value: "base"
      - key: CDP_API_KEY_ID
        sync: false
      - key: CDP_API_KEY_SECRET
        sync: false
      - key: OPERATOR_API_KEY
        sync: false
